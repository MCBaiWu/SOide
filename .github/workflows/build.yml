name: Build APK
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3
      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools ndk;26.1.10909125 cmake;3.22.1"

      - name: Download Capstone (反汇编真库)
        run: |
          set -e
          mkdir -p app/src/main/cpp/third_party
          cd app/src/main/cpp/third_party
          curl -sL https://github.com/capstone-engine/capstone/archive/refs/heads/next.tar.gz -o capstone.tar.gz
          tar xf capstone.tar.gz
          mv capstone-next capstone
          rm capstone.tar.gz
          # 只保留 ARM + AArch64 架构
          cd capstone
          for d in arch/*; do
              name=$(basename "$d")
              case "$name" in
                  ARM|AArch64) ;;
                  *) rm -rf "$d" ;;
              esac
          done
          # 移除不必要的目录与文件（保留 suite/fuzz/ 因为 capstone CMakeLists.txt 引用）
          rm -rf tests docs cstool bindings windowsce msvc xcode windows \
                 cross_configs CMakePresets.json COMPILE.MS* \
                 COMPILE_MAKE.TXT CONTRIB* CREDITS* SPONSORS* \
                 CPackConfig.cmake CPackConfig.txt functions.mk make.sh \
                 pkgconfig.mk config.mk cppext packages \
                 ext_patches contrib Makefile README.md BUILDING.md LICENSES
          # 在 CMakeLists.txt 中禁用 fuzz_disasm 目标（我们不需要它）
          sed -i '/^add_executable(fuzz_disasm /d' CMakeLists.txt
          sed -i '/^target_link_libraries(fuzz_disasm /d' CMakeLists.txt
          echo "Capstone 准备完成:"
          du -sh .

      - run: chmod +x gradlew
      - name: Build with NDK (capstone-engine/capstone 静态链接)
        run: ./gradlew assembleRelease --no-daemon -Pandroid.useAndroidX=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOide-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
