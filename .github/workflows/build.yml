name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p outputs
          cp app/build/outputs/apk/release/app-release-unsigned.apk outputs/SOide-v${{ github.ref_name }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/app-release.apk outputs/SOide.apk 2>/dev/null || \
          echo "APK not found, checking all outputs:" && find app/build -name "*.apk" 2>/dev/null

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SOide-APK
          path: app/build/outputs/apk/release/*.apk

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}