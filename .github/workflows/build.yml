name: Build APK
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  release: { types: [published] }
jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v3
      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools ndk;26.1.10909125 cmake;3.22.1'
      - run: chmod +x gradlew
      - name: Build with NDK (capstone/keystone-style native libs)
        run: ./gradlew assembleRelease --no-daemon -Pandroid.useAndroidX=true
      - uses: actions/upload-artifact@v4
        with: { name: SOide-APK, path: app/build/outputs/apk/release/*.apk }
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with: { files: app/build/outputs/apk/release/*.apk }
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
